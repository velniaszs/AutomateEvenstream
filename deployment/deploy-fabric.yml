trigger: none

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'DEV'
    values:
      - DEV
      - TEST
      - PROD

resources:
  repositories:
    - repository: fabricWorkspace
      type: git
      name: test_Fabric/test_Fabric
      ref: main

# Load environment-specific variable file at compile time
variables:
  - ${{ if eq(parameters.environment, 'DEV') }}:
    - template: variables/dev-variables.yml
  - ${{ if eq(parameters.environment, 'TEST') }}:
    - template: variables/test-variables.yml
  - ${{ if eq(parameters.environment, 'PROD') }}:
    - template: variables/prod-variables.yml

stages:
- stage: DeployFabric
  displayName: 'Deploy Fabric [${{ parameters.environment }}]'
  jobs:
  - deployment: DeployFabricItems
    displayName: 'Deploy Fabric Items'
    # Azure DevOps environment — configure approvals/gates on the environment itself
    environment: 'fabric-${{ lower(parameters.environment) }}'
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          # 1. Checkout repositories
          - checkout: self
            path: 's/AutomateEvenstream'
            displayName: 'Checkout pipeline repository'

          - checkout: fabricWorkspace
            path: 's/test_Fabric'
            displayName: 'Checkout Fabric workspace repository'

          # 2. Retrieve secrets from Azure Key Vault
          - task: AzureKeyVault@2
            displayName: 'Get Secrets from Key Vault'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              KeyVaultName: '$(keyVaultName)'
              SecretsFilter: '$(spClientSecretName)'
              RunAsPreJob: false

          # 3. Install Python
          - task: UsePythonVersion@0
            displayName: 'Use Python 3.12'
            inputs:
              versionSpec: '3.12'
              addToPath: true

          # 4. Install dependencies
          - script: |
              python -m pip install --upgrade pip
              pip install fabric-cicd azure-identity requests
            displayName: 'Install Python packages'

          # 5. Run fabric-cicd deployment script
          - task: PythonScript@0
            displayName: 'Deploy Fabric Items using fabric-cicd'
            inputs:
              scriptSource: 'filePath'
              scriptPath: '$(Build.SourcesDirectory)/AutomateEvenstream/deployment/fabric-cicd.py'
              arguments: >
                --client-id $(clientId)
                --tenant-id $(tenantId)
                --workspace-id $(workspaceId)
                --environment ${{ parameters.environment }}
                --repository-path $(Build.SourcesDirectory)/test_Fabric
            env:
              PYTHONUNBUFFERED: '1'
              CLIENT_SECRET: ${{ format('$({0})', variables.spClientSecretName) }}

          # 6. Execute post-deployment notebook
          - task: PythonScript@0
            displayName: 'Execute Post-Deployment Notebook: PostDeployment'
            inputs:
              scriptSource: 'filePath'
              scriptPath: '$(Build.SourcesDirectory)/AutomateEvenstream/deployment/run_post_deployment.py'
              arguments: >
                --workspace-id $(workspaceId)
                --tenant-id $(tenantId)
                --client-id $(clientId)
                --environment ${{ parameters.environment }}
                --notebook-name PostDeployment
            env:
              PYTHONUNBUFFERED: '1'
              CLIENT_SECRET: ${{ format('$({0})', variables.spClientSecretName) }}
